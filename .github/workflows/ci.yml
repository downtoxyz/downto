name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  check-notify:
    name: Update Notify Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for user-facing changes
        id: check
        run: |
          FILES=$(git diff origin/main...HEAD --name-only)
          if [ -z "$FILES" ]; then
            echo "result=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          USER_FACING_PATTERNS=(
            "src/components/"
            "src/hooks/"
            "src/app/page.tsx"
            "src/app/layout.tsx"
            "src/lib/styles.ts"
            "src/lib/db.ts"
            "src/lib/types.ts"
            "public/"
          )

          HITS=""
          while IFS= read -r file; do
            for pattern in "${USER_FACING_PATTERNS[@]}"; do
              if [[ "$file" == "$pattern"* ]]; then
                HITS+="- \`$file\`\n"
                break
              fi
            done
          done <<< "$FILES"

          if [ -n "$HITS" ]; then
            echo "result=user-facing" >> "$GITHUB_OUTPUT"
            echo "hits<<EOF" >> "$GITHUB_OUTPUT"
            echo -e "$HITS" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "result=safe" >> "$GITHUB_OUTPUT"
          fi
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ steps.check.outputs.result }}';
            const marker = '<!-- check-notify -->';
            let body;
            if (result === 'safe') {
              body = `${marker}\n**Update notify check**: No user-facing changes detected.\n\nUsers will **not** be prompted to update (automatic).`;
            } else if (result === 'user-facing') {
              const hits = `${{ steps.check.outputs.hits }}`;
              body = `${marker}\n**Update notify check**: User-facing files changed:\n\n${hits}\nUsers **will** be prompted to update (automatic).`;
            } else {
              body = `${marker}\n**Update notify check**: No changes detected.`;
            }

            // Update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Start Supabase
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start

      - name: Write env file from Supabase
        run: |
          eval $(supabase status -o env)
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> .env.development.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> .env.development.local
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> .env.development.local
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> $GITHUB_ENV

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
